name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @exifscrub/core run build
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y exiftool
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r apps/worker/requirements.txt
      - run: python -c "from app.main import app; print(app.title)"
        working-directory: apps/worker
      - run: pip install -r apps/worker/requirements.txt pytest httpx
      - name: Worker tests
        working-directory: apps/worker
        env:
          PYTHONPATH: .
        run: pytest tests -q
      - name: Docker build worker
        run: docker build -t exifscrub-worker:test apps/worker
