services:
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      EXIFSCRUB_HMAC_SECRET: ${EXIFSCRUB_HMAC_SECRET:-dev-secret-change-me}
      RETENTION_SECONDS: "300"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
